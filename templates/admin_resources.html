{% extends 'base.html' %}

{% block content %}

<h2>Administration des ressources</h2>

<a href="/admin/resources/create">Ajouter ressource</a>

<table>

<tr>
    <th>ID</th>
    <th>Nom</th>
    <th>Description</th>
    <th>Actions</th>
</tr>

{% for resource in resources %}

<tr>

    <td>{{ resource.id }}</td>
    <td>{{ resource.name }}</td>
    <td>{{ resource.description }}</td>

    <td>
        <a href="/admin/resources/edit/{{ resource.id }}">Modifier</a>
        <a href="/admin/resources/delete/{{ resource.id }}">Supprimer</a>
    </td>

</tr>

{% endfor %}

</table>

{% endblock %}
