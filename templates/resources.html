{% extends 'base.html' %}

{% block content %}

<h2>Ressources disponibles</h2>

<table>

<tr>
    <th>ID</th>
    <th>Nom</th>
    <th>Description</th>
    <th>Action</th>
</tr>

{% for resource in resources %}

<tr>
    <td>{{ resource.id }}</td>
    <td>{{ resource.name }}</td>
    <td>{{ resource.description }}</td>

    <td>
        <a href="/book/{{ resource.id }}">Réserver</a>
    </td>
</tr>

{% endfor %}

</table>

{% endblock %}
