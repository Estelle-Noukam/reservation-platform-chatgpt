{% extends 'base.html' %}

{% block content %}

<h2>Historique des réservations</h2>

<table>

<tr>
    <th>ID</th>
    <th>Ressource</th>
    <th>Date</th>
    <th>Action</th>
</tr>

{% for reservation in reservations %}

<tr>

    <td>{{ reservation.id }}</td>

    <td>{{ reservation.resource.name }}</td>

    <td>{{ reservation.reservation_date }}</td>

    <td>
        <a href="/cancel/{{ reservation.id }}">Annuler</a>
    </td>

</tr>

{% endfor %}

</table>

{% endblock %}
